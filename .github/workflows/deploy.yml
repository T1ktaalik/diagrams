name: Deploy plan of project

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '.gitignore'
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barsa-2-diagram/package-lock.json

      - name: Install dependencies
        run: cd barsa-vue-diagram && npm ci

      - name: Build application
        run: cd barsa-vue-diagram && npm run build

      - name: Configure AWS credentials for Yandex Cloud
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.YC_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.YC_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ru-central1" >> $GITHUB_ENV
          echo "AWS_STS_REGIONAL_ENDPOINTS=regional" >> $GITHUB_ENV

      - name: Deploy to Yandex Object Storage
        run: |
          aws s3 sync barsa-2-diagram/dist "s3://${{ secrets.S3_BUCKET_NAME }}/" \
            --endpoint-url=https://storage.yandexcloud.net \
            --delete \
            --cache-control="public, max-age=31536000" \
            --exclude="*" \
            --include="*.js" \
            --include="*.css" \
            --include="*.woff2" \
            --include="*.woff" \
            --include="*.ttf" \
            --include="*.html" \
            --include="*.png" \
            --include="*.jpg" \
            --include="*.jpeg" \
            --include="*.ico" \
            --include="*.svg" \
            --include="*.json" \
            --include="*.webmanifest"

      - name: Invalidate CDN cache
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.YC_OAUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"paths": ["/*"]}' \
            https://cdn.api.cloud.yandex.net/cdn/v1/cache
